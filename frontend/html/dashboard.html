<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RV4 Lotificaciones — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1B3A6B;--azul-lt:#2a5298;--azul-nav:#152d54;
  --dorado:#D4A800;--dorado-lt:#F0C000;
  --negro:#0f1117;--blanco:#ffffff;
  --gris:#f4f5f7;--gris-lt:#fafbfc;
  --borde:#dde1e7;--borde-lt:#eaecf0;
  --texto:#1a1f2e;--muted:#6b7280;--sidebar-w:220px;
  --green:#16a34a;--green-bg:#f0fdf4;
  --blue:#1d4ed8;--blue-bg:#eff6ff;
  --red:#b91c1c;--red-bg:#fef2f2;
  --purple:#6d28d9;--purple-bg:#f5f3ff;
  --amber:#b45309;--amber-bg:#fffbeb;
}
body{font-family:'Montserrat',sans-serif;background:var(--gris);color:var(--texto);min-height:100vh;display:flex;font-size:13px}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--azul);min-height:100vh;display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.brand-img{height:32px;display:block;background:#fff;border-radius:3px;padding:4px 6px}
.brand-fallback{display:none;font-size:20px;font-weight:700;color:#fff}
.brand-fallback span{color:var(--dorado)}
.brand-env{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:5px;font-weight:600}
.sidebar-nav{flex:1;padding:14px 0;overflow-y:auto}
.nav-section{padding:0 10px;margin-bottom:2px}
.nav-label{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:10px 8px 4px;display:block;font-weight:600}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:5px;color:rgba(255,255,255,.6);font-size:12px;font-weight:500;cursor:pointer;transition:background .15s,color .15s;text-decoration:none;margin-bottom:1px}
.nav-item:hover{background:rgba(255,255,255,.1);color:#fff}
.nav-item.active{background:var(--dorado);color:var(--negro);font-weight:700}
.nav-item svg{width:14px;height:14px;flex-shrink:0;opacity:.75}
.nav-item.active svg{opacity:1}
.nav-badge{margin-left:auto;background:rgba(255,255,255,.12);color:rgba(255,255,255,.5);font-size:8.5px;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:12px 10px;border-top:1px solid rgba(255,255,255,.1)}
.user-pill{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:5px;background:rgba(255,255,255,.08)}
.user-avatar{width:27px;height:27px;border-radius:50%;background:var(--dorado);color:var(--negro);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-size:11px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:9px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.btn-logout{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);padding:4px;transition:color .2s}
.btn-logout:hover{color:#f87171}
.btn-logout svg{width:13px;height:13px}

/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.topbar{background:var(--blanco);border-bottom:1px solid var(--borde);padding:0 26px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.page-title{font-size:15px;font-weight:700;color:var(--azul)}
.topbar-right{display:flex;align-items:center;gap:12px}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);font-weight:500}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
.sync-dot.stale{background:var(--amber);animation:none}
.sync-dot.error{background:var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn-sync{display:flex;align-items:center;gap:6px;padding:7px 15px;background:var(--azul);color:#fff;border:none;border-radius:4px;font-family:'Montserrat',sans-serif;font-size:11px;font-weight:700;letter-spacing:.05em;cursor:pointer;transition:background .2s}
.btn-sync:hover{background:var(--dorado);color:var(--negro)}
.btn-sync svg{width:13px;height:13px}
.btn-sync.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* CONTENT */
.content{padding:22px 26px;flex:1}
.kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;padding:16px 18px;position:relative;overflow:hidden;transition:box-shadow .2s}
.kpi-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.07)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.total::before{background:var(--azul)}
.kpi-card.disp::before{background:var(--green)}
.kpi-card.venta::before{background:var(--blue)}
.kpi-card.bloq::before{background:var(--red)}
.kpi-card.absorb::before{background:var(--dorado)}
.kpi-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.kpi-value{font-size:26px;font-weight:700;color:var(--texto);line-height:1;margin-bottom:4px}
.kpi-sub{font-size:10.5px;color:var(--muted);font-weight:500}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.section-title{font-size:14px;font-weight:700;color:var(--azul)}
.filter-row{display:flex;gap:8px;align-items:center}
.filter-select{padding:7px 10px;border:1px solid var(--borde);border-radius:4px;background:var(--blanco);font-family:'Montserrat',sans-serif;font-size:11.5px;font-weight:500;color:var(--texto);outline:none;cursor:pointer}
.filter-select:focus{border-color:var(--azul)}
.search-box{display:flex;align-items:center;border:1px solid var(--borde);border-radius:4px;background:var(--blanco);padding:0 10px;gap:7px}
.search-box:focus-within{border-color:var(--azul)}
.search-box svg{width:13px;height:13px;color:var(--muted);flex-shrink:0}
.search-box input{border:none;background:none;font-family:'Montserrat',sans-serif;font-size:11.5px;font-weight:500;color:var(--texto);outline:none;padding:7px 0;width:175px}
.search-box input::placeholder{color:#aab0bc}

.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:12px}
.project-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;text-decoration:none;display:block}
.project-card:hover{border-color:var(--azul);box-shadow:0 4px 16px rgba(27,58,107,.1);transform:translateY(-1px)}
.project-card-header{padding:13px 14px 9px;border-bottom:1px solid var(--borde-lt);display:flex;justify-content:space-between;align-items:flex-start}
.project-name{font-size:12.5px;font-weight:700;color:var(--azul);line-height:1.25}
.project-sociedad{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.absorcion-badge{font-size:11.5px;font-weight:700;padding:3px 8px;border-radius:3px;background:#EBF0FA;color:var(--azul);white-space:nowrap;flex-shrink:0;margin-left:8px}
.absorcion-badge.high{background:#f0fdf4;color:var(--green)}
.absorcion-badge.med{background:#fffbeb;color:var(--amber)}
.progress-bar{height:3px;background:var(--borde-lt);border-radius:2px;margin:8px 14px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--azul),var(--dorado));transition:width .8s ease}
.project-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:0 12px 10px}
.stat-box{text-align:center;padding:6px 3px;border-radius:4px}
.stat-num{font-size:16px;font-weight:700;line-height:1;margin-bottom:2px}
.stat-lbl{font-size:8.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.stat-box.disp{background:var(--green-bg)}.stat-box.disp .stat-num{color:var(--green)}.stat-box.disp .stat-lbl{color:#86efac}
.stat-box.venta{background:var(--blue-bg)}.stat-box.venta .stat-num{color:var(--blue)}.stat-box.venta .stat-lbl{color:#93c5fd}
.stat-box.bloq{background:var(--red-bg)}.stat-box.bloq .stat-num{color:var(--red)}.stat-box.bloq .stat-lbl{color:#fca5a5}
.stat-box.canje{background:var(--purple-bg)}.stat-box.canje .stat-num{color:var(--purple)}.stat-box.canje .stat-lbl{color:#c4b5fd}
.project-card-footer{padding:8px 14px;border-top:1px solid var(--borde-lt);display:flex;justify-content:space-between;align-items:center}
.valor-text{font-size:10px;color:var(--muted);font-weight:500}
.valor-num{font-size:12px;font-weight:700;color:var(--texto)}
.btn-ver{font-size:10.5px;font-weight:700;color:var(--dorado);text-decoration:none}
.btn-ver:hover{color:var(--azul)}

.skeleton-card{background:var(--blanco);border:1px solid var(--borde);border-radius:6px;height:165px;background:linear-gradient(90deg,var(--borde-lt) 25%,var(--borde) 50%,var(--borde-lt) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;background:var(--azul);color:#fff;font-size:12px;font-weight:600;z-index:999;border-radius:5px;transform:translateY(80px);opacity:0;transition:transform .3s,opacity .3s;max-width:280px}
.toast.show{transform:none;opacity:1}
.toast.ok{border-left:3px solid var(--green)}
.toast.err{border-left:3px solid #f87171}
@media(max-width:1200px){.kpi-strip{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

<script>

// ── CONTROL DE ACCESO ────────────────────────────────────────
(function() {
  var token = localStorage.getItem('token');
  var usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
  if (!token || !usuario) { window.location.href = '/index.html'; return; }
  if (usuario.nivel < 1) { window.location.href = '/index.html'; return; }

  // Setup usuario info in sidebar
  var el = function(id) { return document.getElementById(id); };
  if (el('userName')) el('userName').textContent = usuario.nombre || '—';
  if (el('userRole')) el('userRole').textContent = usuario.rol ? usuario.rol.replace(/_/g,' ') : '—';
  if (el('userAvatar')) el('userAvatar').textContent = (usuario.nombre || 'A')[0].toUpperCase();
  if (el('envLabel')) el('envLabel').textContent = window.location.hostname === 'localhost' ? 'DESARROLLO' : 'PRODUCCIÓN';

  // Show admin section only for nivel >= 4
  if (el('adminSection')) el('adminSection').style.display = usuario.nivel >= 4 ? 'block' : 'none';

  // Store globally for use in page scripts
  window._usuario = usuario;
  window._token = token;
})();

// ── AUTO-LOGOUT POR INACTIVIDAD (2 minutos) ──────────────────
(function() {
  var TIMEOUT_MS = 2 * 60 * 1000;
  var WARNING_MS = 30 * 1000;
  var timer, warningTimer, cdInterval;

  function resetTimer() {
    clearTimeout(timer); clearTimeout(warningTimer); clearInterval(cdInterval);
    hideWarning();
    warningTimer = setTimeout(showWarning, TIMEOUT_MS - WARNING_MS);
    timer = setTimeout(function() {
      hideWarning();
      localStorage.clear();
      window.location.href = '/index.html?timeout=1';
    }, TIMEOUT_MS);
  }

  function showWarning() {
    var w = document.getElementById('_inactiveWarning');
    if (!w) {
      w = document.createElement('div');
      w.id = '_inactiveWarning';
      w.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1B3A6B;color:#fff;padding:12px 20px;border-radius:8px;font-family:Montserrat,sans-serif;font-size:12px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);display:flex;align-items:center;gap:12px;border-left:4px solid #D4A800';
      document.body.appendChild(w);
    }
    var secs = 30;
    w.innerHTML = '⚠ Sesión cerrará en <strong id="_cd">' + secs + '</strong> seg &nbsp;<button onclick="window.resetTimer()" style="background:#D4A800;color:#1B3A6B;border:none;padding:4px 10px;border-radius:4px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;cursor:pointer">Continuar</button>';
    w.style.display = 'flex';
    cdInterval = setInterval(function() {
      secs--;
      var el = document.getElementById('_cd');
      if (el) el.textContent = secs;
      if (secs <= 0) clearInterval(cdInterval);
    }, 1000);
  }

  function hideWarning() {
    var w = document.getElementById('_inactiveWarning');
    if (w) w.style.display = 'none';
  }

  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(function(e) {
    document.addEventListener(e, resetTimer, {passive:true});
  });

  resetTimer();
  window.resetTimer = resetTimer;
})();

const API='';
let allProjects=[];

// Aliases
var token = window._token;
var usuario = window._usuario;

async function apiFetch(p,o={}){
  const r=await fetch(API+p,{...o,headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json',...(o.headers||{})}});
  if(r.status===401){logout();return null;} return r.json();
}
const fmtNum=n=>Number(n||0).toLocaleString('es-GT');
const fmtQ=n=>'Q '+Number(n||0).toLocaleString('es-GT',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtPct=n=>Number(n||0).toFixed(1)+'%';

async function loadDashboard(){
  const data=await apiFetch('/api/inventario/resumen');
  if(!data) return;
  allProjects=data.proyectos||[];
  renderKPIs(data.totales||{});
  renderSyncStatus(data.ultima_sincronizacion);
  renderProjects(allProjects);
}

function renderKPIs(t){
  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi-card total"><div class="kpi-label">Total Lotes</div><div class="kpi-value">${fmtNum(t.total_lotes)}</div><div class="kpi-sub">${allProjects.length} proyectos activos</div></div>
    <div class="kpi-card disp"><div class="kpi-label">Disponibles</div><div class="kpi-value" style="color:var(--green)">${fmtNum(t.disponibles)}</div><div class="kpi-sub">${fmtQ(t.valor_disponible)}</div></div>
    <div class="kpi-card venta"><div class="kpi-label">Vendidos / Reservados</div><div class="kpi-value" style="color:var(--blue)">${fmtNum(t.vendidos)}</div><div class="kpi-sub">${fmtQ(t.valor_vendido)} comprometido</div></div>
    <div class="kpi-card bloq"><div class="kpi-label">Bloqueados</div><div class="kpi-value" style="color:var(--red)">${fmtNum(t.bloqueados)}</div><div class="kpi-sub">${fmtNum(t.canjes||0)} en canje</div></div>
    <div class="kpi-card absorb"><div class="kpi-label">Absorción Global</div><div class="kpi-value" style="color:var(--dorado)">${fmtPct(t.pct_absorcion)}</div><div class="kpi-sub">${fmtQ(t.valor_total)} valor total</div></div>`;
}

function renderSyncStatus(sync){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText');
  if(!sync){dot.className='sync-dot stale';txt.textContent='Sin sincronización';return;}
  const mins=Math.floor((Date.now()-new Date(sync.fin).getTime())/60000);
  if(mins<90){dot.className='sync-dot';txt.textContent=`Actualizado hace ${mins<1?'menos de 1 min':mins+' min'}`;}
  else{dot.className='sync-dot stale';txt.textContent=`Última sync: hace ${Math.floor(mins/60)}h`;}
}

function renderProjects(projects){
  const grid=document.getElementById('projectsGrid');
  if(!projects.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-weight:600">No hay proyectos disponibles</div>';return;}
  grid.innerHTML=projects.map((p,i)=>{
    const pct=Number(p.porcentaje_absorcion||0);
    const bc=pct>=60?'high':pct>=30?'med':'';
    return `<a class="project-card" href="/inventario.html?proyecto_id=${p.proyecto_id}">
      <div class="project-card-header">
        <div><div class="project-name">${p.nombre_proyecto}</div><div class="project-sociedad">${p.nombre_sociedad}</div></div>
        <div class="absorcion-badge ${bc}">${fmtPct(pct)}</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${Math.min(pct,100)}%"></div></div>
      <div class="project-stats">
        <div class="stat-box disp"><div class="stat-num">${fmtNum(p.disponibles)}</div><div class="stat-lbl">Disp.</div></div>
        <div class="stat-box venta"><div class="stat-num">${fmtNum(p.vendidos_reservados)}</div><div class="stat-lbl">Venta</div></div>
        <div class="stat-box bloq"><div class="stat-num">${fmtNum(p.bloqueados)}</div><div class="stat-lbl">Bloq.</div></div>
        <div class="stat-box canje"><div class="stat-num">${fmtNum(p.canjes)}</div><div class="stat-lbl">Canje</div></div>
      </div>
      <div class="project-card-footer">
        <div><div class="valor-text">Valor disponible</div><div class="valor-num">${fmtQ(p.valor_disponible)}</div></div>
        <span class="btn-ver">Ver lotes →</span>
      </div>
    </a>`;
  }).join('');
}

function filterProjects(){
  const s=document.getElementById('searchInput').value.toLowerCase();
  const f=document.getElementById('statusFilter').value;
  let r=allProjects.filter(p=>p.nombre_proyecto.toLowerCase().includes(s)||p.nombre_sociedad.toLowerCase().includes(s));
  if(f==='alta') r=r.filter(p=>Number(p.porcentaje_absorcion)>=60);
  if(f==='media') r=r.filter(p=>Number(p.porcentaje_absorcion)>=30&&Number(p.porcentaje_absorcion)<60);
  if(f==='baja') r=r.filter(p=>Number(p.porcentaje_absorcion)<30);
  renderProjects(r);
}

async function triggerSync(){
  if(usuario?.nivel<3){showToast('Sin permisos','err');return;}
  const btn=document.getElementById('btnSync');
  btn.classList.add('spinning');btn.disabled=true;
  showToast('Sincronización iniciada...','ok');
  try{
    await apiFetch('/api/sync/inventario',{method:'POST'});
    setTimeout(async()=>{await loadDashboard();showToast('Inventario actualizado','ok');btn.classList.remove('spinning');btn.disabled=false;},4000);
  }catch{showToast('Error al sincronizar','err');btn.classList.remove('spinning');btn.disabled=false;}
}

function showToast(msg,type='ok'){const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${type} show`;setTimeout(()=>el.classList.remove('show'),3500);}
function logout(){localStorage.clear();window.location.href='/index.html';}
loadDashboard();
setInterval(loadDashboard,5*60*1000);
</script>
