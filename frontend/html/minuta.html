<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Minuta de Reunión — RV4</title>
<style>
  :root{
    --bg:#0d1117;--bg-card:#131d2e;--bg-section:#0f172a;
    --text:#e2e8f0;--text-soft:#94a3b8;--muted:#475569;
    --border:#1e3a5f;--border-soft:#162236;
    --blue:#3b82f6;--dorado:#d4a017;--green:#10b981;--red:#ef4444;--amber:#f59e0b;
    --azul:#1B3A6B;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Montserrat',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  .page-header{background:var(--bg-section);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;gap:16px;justify-content:space-between}
  .page-title{font-size:18px;font-weight:700;color:var(--text)}
  .page-sub{font-size:13px;color:var(--text-soft);margin-top:2px}
  .controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  select{background:var(--bg-card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 12px;font-size:13px;font-family:inherit;cursor:pointer}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;border:none;transition:.15s}
  .btn-primary{background:var(--dorado);color:#000}
  .btn-primary:hover{background:#b8880f}
  .btn-secondary{background:var(--bg-card);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--border)}
  .btn-green{background:var(--green);color:#fff}
  .btn-green:hover{opacity:.85}
  .btn-red{background:var(--red);color:#fff}
  .btn-sm{padding:5px 10px;font-size:12px}
  .main{max-width:1200px;margin:0 auto;padding:24px 28px}
  .card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;overflow:hidden}
  .card-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-title{font-size:14px;font-weight:700;color:var(--dorado);text-transform:uppercase;letter-spacing:.06em}
  .card-body{padding:0}
  table{width:100%;border-collapse:collapse}
  th{background:var(--azul);color:#fff;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;text-align:left}
  td{border-bottom:1px solid var(--border-soft);padding:0}
  td input,td textarea{width:100%;background:transparent;border:none;color:var(--text);font-family:inherit;font-size:13px;padding:10px 14px;resize:none;outline:none}
  td input::placeholder,td textarea::placeholder{color:var(--muted)}
  td input:focus,td textarea:focus{background:rgba(59,130,246,.06)}
  td.act-col{text-align:center;width:48px}
  td.act-col button{background:none;border:none;cursor:pointer;color:var(--red);font-size:16px;padding:4px 8px}
  .empty-row td{padding:30px;text-align:center;color:var(--muted);font-size:13px}
  .status-bar{background:var(--bg-section);border-top:1px solid var(--border);padding:8px 28px;font-size:12px;color:var(--text-soft);display:flex;align-items:center;justify-content:space-between}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
  .pill-green{background:rgba(16,185,129,.15);color:var(--green)}
  .pill-amber{background:rgba(245,158,11,.15);color:var(--amber)}
  .historial-item{padding:12px 16px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .historial-item:hover{background:var(--bg-section)}
  .historial-item:last-child{border-bottom:none}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:500px;width:90%}
  .modal-title{font-size:16px;font-weight:700;margin-bottom:16px}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:2000;display:none;animation:fadeIn .2s}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <div class="page-title">📋 Minuta de Reunión</div>
    <div class="page-sub">Completa la minuta por período. Se importa automáticamente a la presentación JD.</div>
  </div>
  <div class="controls">
    <select id="selMes">
      <option value="1">Enero</option><option value="2">Febrero</option>
      <option value="3">Marzo</option><option value="4">Abril</option>
      <option value="5">Mayo</option><option value="6">Junio</option>
      <option value="7">Julio</option><option value="8">Agosto</option>
      <option value="9">Septiembre</option><option value="10">Octubre</option>
      <option value="11">Noviembre</option><option value="12">Diciembre</option>
    </select>
    <select id="selAnio"></select>
    <button class="btn btn-secondary" onclick="cargarMinuta()">📂 Cargar</button>
    <button class="btn btn-primary" onclick="guardarMinuta()">💾 Guardar</button>
    <button class="btn btn-secondary" onclick="location.href='/presentacion.html'" title="Abrir presentación JD">🖥 Ver Presentación</button>
  </div>
</div>

<div class="main">
  <!-- Editor de Acuerdos -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Acuerdos y Seguimiento</span>
      <div style="display:flex;gap:8px;align-items:center">
        <span id="lastModLabel" style="font-size:12px;color:var(--text-soft)"></span>
        <button class="btn btn-green btn-sm" onclick="agregarFila()">+ Agregar fila</button>
      </div>
    </div>
    <div class="card-body">
      <table id="minutasTable">
        <thead>
          <tr>
            <th style="width:35%">Acuerdo / Tema</th>
            <th style="width:18%">Responsable</th>
            <th style="width:35%">Observación</th>
            <th style="width:10%">Fecha</th>
            <th style="width:48px"></th>
          </tr>
        </thead>
        <tbody id="minutasTbody">
          <tr class="empty-row"><td colspan="5">Sin acuerdos. Presioná "+ Agregar fila" para comenzar.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Historial de minutas guardadas -->
  <div class="card">
    <div class="card-header">
      <span class="card-title">Historial de Minutas</span>
      <button class="btn btn-secondary btn-sm" onclick="renderHistorial()">🔄 Actualizar</button>
    </div>
    <div class="card-body" id="historialContainer">
      <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Cargando historial…</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="statusMsg">Listo</span>
  <span id="statusPeriod"></span>
</div>

<div id="toastEl" class="toast"></div>

<script>
const MESES = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const KEY = (anio, mes) => `rv4_minutas_${anio}_${String(mes).padStart(2,'0')}`;
let currentAnio = new Date().getFullYear();
let currentMes  = new Date().getMonth() + 1;

// Init year dropdown
function initYears() {
  const sel = document.getElementById('selAnio');
  for (let y = currentAnio + 1; y >= 2023; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === currentAnio) o.selected = true;
    sel.appendChild(o);
  }
}

function getSelValues() {
  return {
    mes: Number(document.getElementById('selMes').value),
    anio: Number(document.getElementById('selAnio').value)
  };
}

function renderRows(items) {
  const tbody = document.getElementById('minutasTbody');
  if (!items || !items.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="5">Sin acuerdos. Presioná "+ Agregar fila" para comenzar.</td></tr>';
    return;
  }
  tbody.innerHTML = items.map((item, i) => `
    <tr data-idx="${i}">
      <td><input type="text" placeholder="Acuerdo o tema de seguimiento…" value="${escHtml(item.tema||'')}" oninput="updateRow(${i},'tema',this.value)"></td>
      <td><input type="text" placeholder="Responsable" value="${escHtml(item.responsable||'')}" oninput="updateRow(${i},'responsable',this.value)"></td>
      <td><input type="text" placeholder="Observación o estado" value="${escHtml(item.observacion||'')}" oninput="updateRow(${i},'observacion',this.value)"></td>
      <td><input type="date" value="${item.fecha||''}" oninput="updateRow(${i},'fecha',this.value)"></td>
      <td class="act-col"><button onclick="eliminarFila(${i})" title="Eliminar fila">✕</button></td>
    </tr>`).join('');
}

let rows = [];

function updateRow(i, field, val) { if (rows[i]) rows[i][field] = val; }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }

function agregarFila() {
  // Remove empty-row if present
  const emptyRow = document.querySelector('#minutasTbody .empty-row');
  if (emptyRow) emptyRow.remove();
  rows.push({ tema:'', responsable:'', observacion:'', fecha:'' });
  renderRows(rows);
  // Focus first input of last row
  const inputs = document.querySelectorAll('#minutasTbody tr:last-child input');
  if (inputs[0]) inputs[0].focus();
}

function eliminarFila(i) {
  rows.splice(i, 1);
  renderRows(rows);
}

function cargarMinuta() {
  const { mes, anio } = getSelValues();
  currentMes = mes; currentAnio = anio;
  const key = KEY(anio, mes);
  try {
    const data = JSON.parse(localStorage.getItem(key) || 'null');
    if (data) {
      rows = data.items || [];
      document.getElementById('lastModLabel').textContent = data.lastMod ? 'Modificado: ' + data.lastMod : '';
    } else {
      rows = [];
      document.getElementById('lastModLabel').textContent = '';
    }
  } catch(e) { rows = []; }
  renderRows(rows);
  document.getElementById('statusPeriod').textContent = `${MESES[mes]} ${anio}`;
  showToast(`Minuta de ${MESES[mes]} ${anio} cargada`, 'green');
}

function guardarMinuta() {
  const { mes, anio } = getSelValues();
  // Sync any unsaved row edits from DOM
  document.querySelectorAll('#minutasTbody tr[data-idx]').forEach(tr => {
    const i = Number(tr.dataset.idx);
    const inputs = tr.querySelectorAll('input');
    if (rows[i]) {
      rows[i].tema        = inputs[0]?.value || '';
      rows[i].responsable = inputs[1]?.value || '';
      rows[i].observacion = inputs[2]?.value || '';
      rows[i].fecha       = inputs[3]?.value || '';
    }
  });
  const filteredRows = rows.filter(r => r.tema || r.responsable || r.observacion);
  const lastMod = new Date().toLocaleString('es-GT');
  const data = { items: filteredRows, lastMod, mes, anio };
  localStorage.setItem(KEY(anio, mes), JSON.stringify(data));
  document.getElementById('lastModLabel').textContent = 'Modificado: ' + lastMod;
  showToast(`✓ Minuta de ${MESES[mes]} ${anio} guardada (${filteredRows.length} acuerdos)`, 'green');
  renderHistorial();
}

function limpiarMinuta() {
  if (!confirm('¿Limpiar todos los acuerdos de este período? Esta acción no se puede deshacer.')) return;
  const { mes, anio } = getSelValues();
  localStorage.removeItem(KEY(anio, mes));
  rows = [];
  renderRows(rows);
  document.getElementById('lastModLabel').textContent = '';
  showToast('Minuta limpiada', 'amber');
  renderHistorial();
}

function renderHistorial() {
  const container = document.getElementById('historialContainer');
  const guardadas = [];
  for (let k in localStorage) {
    if (k.startsWith('rv4_minutas_')) {
      try {
        const d = JSON.parse(localStorage.getItem(k));
        if (d) guardadas.push({ key: k, ...d });
      } catch(e) {}
    }
  }
  guardadas.sort((a,b) => b.key.localeCompare(a.key));
  if (!guardadas.length) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sin minutas guardadas aún</div>';
    return;
  }
  container.innerHTML = guardadas.map(g => `
    <div class="historial-item" onclick="cargarDesdeHistorial(${g.mes},${g.anio})">
      <div>
        <div style="font-weight:600;font-size:13px">${MESES[g.mes]||g.mes} ${g.anio}</div>
        <div style="font-size:12px;color:var(--text-soft)">${g.lastMod||''}</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span class="pill pill-green">${(g.items||[]).length} acuerdos</span>
        <button class="btn btn-red btn-sm" onclick="event.stopPropagation();borrarHistorial('${g.key}')">🗑</button>
      </div>
    </div>`).join('');
}

function cargarDesdeHistorial(mes, anio) {
  document.getElementById('selMes').value = mes;
  document.getElementById('selAnio').value = anio;
  cargarMinuta();
}

function borrarHistorial(key) {
  if (!confirm('¿Eliminar esta minuta del historial?')) return;
  localStorage.removeItem(key);
  renderHistorial();
}

function showToast(msg, type) {
  const t = document.getElementById('toastEl');
  t.textContent = msg;
  t.style.background = type === 'green' ? '#10b981' : type === 'amber' ? '#f59e0b' : '#ef4444';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}

// Init
initYears();
document.getElementById('selMes').value = currentMes;
cargarMinuta();
renderHistorial();
document.getElementById('statusMsg').textContent = 'Datos guardados localmente en este navegador';
</script>
</body>
</html>
