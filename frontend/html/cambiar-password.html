<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cambiar Contraseña — RV4</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',sans-serif;background:linear-gradient(135deg,#1B3A6B 0%,#2a5298 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;padding:40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:28px}
.logo-text{font-size:28px;font-weight:700;color:#1B3A6B;letter-spacing:2px}
.logo-text span{color:#D4A800}
.badge{display:inline-flex;align-items:center;gap:6px;background:#fffbeb;color:#d97706;border:1px solid #fde68a;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:20px}
h2{font-size:18px;font-weight:700;color:#1B3A6B;margin-bottom:6px}
.subtitle{font-size:12px;color:#6b7280;margin-bottom:24px;line-height:1.5}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:700;color:#1a1f2e;margin-bottom:5px}
.form-input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:6px;font-family:'Montserrat',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
.form-input:focus{border-color:#1B3A6B}
.strength-bar{height:4px;border-radius:2px;margin-top:6px;background:#e5e7eb;overflow:hidden}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.strength-label{font-size:10px;margin-top:4px;font-weight:600}
.btn{width:100%;padding:11px;border-radius:6px;background:#1B3A6B;color:#fff;font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;margin-top:8px;transition:opacity .15s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}
.error-msg{display:none;background:#fef2f2;color:#b91c1b;border:1px solid #fecaca;padding:8px 12px;border-radius:5px;font-size:12px;margin-bottom:14px}
.error-msg.show{display:block}
.req-list{margin-top:10px;list-style:none}
.req-list li{font-size:10px;color:#9ca3af;margin-bottom:3px;display:flex;align-items:center;gap:5px}
.req-list li.ok{color:#16a34a}
.req-list li::before{content:'○';font-size:9px}
.req-list li.ok::before{content:'●'}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">RV<span>4</span></div>
  </div>
  <div style="text-align:center;margin-bottom:20px">
    <div class="badge">🔐 Primer ingreso</div>
  </div>
  <h2>Cambia tu contraseña</h2>
  <p class="subtitle">Por seguridad, debes establecer una contraseña personal antes de continuar. La contraseña temporal no podrá usarse nuevamente.</p>
  <div class="error-msg" id="errMsg"></div>
  <div class="form-group">
    <label class="form-label">Nueva contraseña</label>
    <input class="form-input" type="password" id="pass1" oninput="checkStrength()" placeholder="Mínimo 8 caracteres">
    <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
    <div class="strength-label" id="strengthLabel" style="color:#9ca3af"></div>
  </div>
  <div class="form-group">
    <label class="form-label">Confirmar contraseña</label>
    <input class="form-input" type="password" id="pass2" oninput="checkMatch()" placeholder="Repite la contraseña">
    <div id="matchMsg" style="font-size:10px;margin-top:4px"></div>
  </div>
  <ul class="req-list" id="reqList">
    <li id="req-len">Mínimo 8 caracteres</li>
    <li id="req-upper">Al menos una mayúscula</li>
    <li id="req-num">Al menos un número</li>
    <li id="req-match">Las contraseñas coinciden</li>
  </ul>
  <button class="btn" id="saveBtn" onclick="savePassword()" disabled>Establecer contraseña y entrar</button>
</div>
<script>
const token = localStorage.getItem('token');
const usuario = JSON.parse(localStorage.getItem('usuario') || 'null');
if (!token || !usuario) window.location.href = '/index.html';

function req(id, ok) {
  const el = document.getElementById(id);
  ok ? el.classList.add('ok') : el.classList.remove('ok');
}

function checkStrength() {
  const p = document.getElementById('pass1').value;
  const hasLen = p.length >= 8;
  const hasUpper = /[A-Z]/.test(p);
  const hasNum = /[0-9]/.test(p);
  req('req-len', hasLen); req('req-upper', hasUpper); req('req-num', hasNum);
  const score = [hasLen, hasUpper, hasNum].filter(Boolean).length;
  const fill = document.getElementById('strengthFill');
  const label = document.getElementById('strengthLabel');
  const configs = ['','33%','66%','100%'];
  const colors = ['','#ef4444','#d97706','#16a34a'];
  const labels = ['','Débil','Regular','Segura'];
  fill.style.width = configs[score]; fill.style.background = colors[score];
  label.textContent = labels[score]; label.style.color = colors[score];
  checkMatch();
}

function checkMatch() {
  const p1 = document.getElementById('pass1').value;
  const p2 = document.getElementById('pass2').value;
  const match = p1 === p2 && p2.length > 0;
  req('req-match', match);
  const msg = document.getElementById('matchMsg');
  if (p2.length > 0) {
    msg.textContent = match ? '✓ Coinciden' : '✗ No coinciden';
    msg.style.color = match ? '#16a34a' : '#ef4444';
  } else { msg.textContent = ''; }
  const allOk = p1.length >= 8 && /[A-Z]/.test(p1) && /[0-9]/.test(p1) && match;
  document.getElementById('saveBtn').disabled = !allOk;
}

async function savePassword() {
  const password = document.getElementById('pass1').value;
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Guardando...'; btn.disabled = true;
  const r = await fetch(`/api/auth/usuarios/${usuario.id}`, {
    method: 'PUT',
    headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'},
    body: JSON.stringify({password})
  });
  if (r.ok) {
    window.location.href = '/dashboard.html';
  } else {
    document.getElementById('errMsg').textContent = 'Error al guardar. Intenta de nuevo.';
    document.getElementById('errMsg').classList.add('show');
    btn.textContent = 'Establecer contraseña y entrar'; btn.disabled = false;
  }
}
</script>
</body>
</html>
