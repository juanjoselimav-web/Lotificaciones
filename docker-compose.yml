version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: loti_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - loti_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: loti_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: ${ENVIRONMENT}
      SYNC_INTERVAL_MINUTES: ${SYNC_INTERVAL_MINUTES}
      # Rutas internas del contenedor (montadas via volumen)
      PATH_FLUJOS: /data/sources/FLUJOS_DE_EFECTIVO.xlsx
      PATH_OV_CARTERA: /data/sources/OV_CARTERA_DESIST_METAS.xlsx
      PATH_INVENTARIO: /data/sources/VERSION_FINAL_INVENTARIOS_LOTES_V2.xlsx
    volumes:
      - ${ONEDRIVE_PATH}:/data/sources:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loti_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: loti_frontend
    restart: unless-stopped
    networks:
      - loti_network

  nginx:
    image: nginx:alpine
    container_name: loti_nginx
    restart: unless-stopped
    ports:
      - "5004:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - loti_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: loti_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - loti_network

volumes:
  postgres_data:

networks:
  loti_network:
    driver: bridge
